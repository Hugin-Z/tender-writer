# 公司注册表(集中事实来源)
# 所有涉及的公司在这里注册,其他地方(assets/、knowledge_base/)通过 id 引用
# 新增公司请通过 Claude Code 触发"新增公司"辅助工作流,不要手动编辑
#
# id 命名规则:
#   - own 类型:    own_<拼音/英文缩写>     (如 own_default、own_jiao)
#   - partner 类型: partner_<拼音缩写>      (如 partner_xinda)
#   - reference 类型: ref_<拼音缩写>         (如 ref_huawei)
#
# type 字段含义:
#   - own:     我方主体,材料可直接引用进标书
#   - partner: 合作方/联合体/分包方,材料可引用但必须标注来源
#   - reference: 竞品/行业标杆/公开案例,严禁直接引用进标书,只能作为学习参考

companies:
  - id: own_default
    name: 我方主体
    type: own
    description: 默认主体,请修改为实际公司名或通过新增公司工作流调整
    aliases: []
    created_at: 2026-04-09
